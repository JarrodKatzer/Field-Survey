// ---------- Constants ----------
// Palette tuned for high-sunlight outdoor readability:
// near-white background for max luminance, very dark ink for max text contrast,
// saturated rust/amber that stay distinguishable under glare.
const COLORS = {
  bg: "#F2EAD8",        // brighter sand — higher luminance under sun
  card: "#FFFFFF",      // pure white cards — maximum contrast against dark text
  ink: "#1E2A22",       // near-black green-ink — deeper than before for contrast
  inkSoft: "#4A5750",   // darkened soft text so it stays legible in glare
  rust: "#9A3412",      // deeper, more saturated rust — reads clearly in bright light
  rustDark: "#6B2410",
  amber: "#B45309",     // deepened amber for alert legibility
  line: "#BBA77E",      // slightly darker hairlines so edges remain visible
};

const STORAGE_PREFIX = "fieldsurvey";

// ───────────────────────── Dropbox integration ─────────────────────────
// App key is a public client identifier — safe to include in client-side code.
// We use PKCE (no app secret), so this alone cannot grant anyone access to your
// Dropbox; each user must still approve via Dropbox's own login screen, and the
// resulting token is stored only on this device.
const DROPBOX_APP_KEY = "yyw2qs9fgm9y932";

function dbxRedirectUri() {
  // Must exactly match the redirect URI registered in the Dropbox App Console.
  // Uses the current page's origin + path so it works from GitHub Pages.
  return window.location.origin + window.location.pathname;
}

// ----- PKCE helpers -----
function base64UrlEncode(bytes) {
  let str = btoa(String.fromCharCode(...new Uint8Array(bytes)));
  return str.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
}
async function sha256(plain) {
  const data = new TextEncoder().encode(plain);
  return await crypto.subtle.digest("SHA-256", data);
}
function randomString(len) {
  const arr = new Uint8Array(len);
  crypto.getRandomValues(arr);
  return base64UrlEncode(arr).slice(0, len);
}

// Begin the Dropbox login: build a code verifier/challenge, stash the verifier,
// and redirect the browser to Dropbox's authorization page.
async function dbxBeginLogin() {
  const verifier = randomString(64);
  const challenge = base64UrlEncode(await sha256(verifier));
  sessionStorage.setItem("dbx_verifier", verifier);
  const params = new URLSearchParams({
    client_id: DROPBOX_APP_KEY,
    response_type: "code",
    code_challenge: challenge,
    code_challenge_method: "S256",
    redirect_uri: dbxRedirectUri(),
    token_access_type: "online", // short-lived token, no long-lived refresh token
    scope: "account_info.read files.metadata.read files.metadata.write files.content.read files.content.write",
  });
  window.location.href = "https://www.dropbox.com/oauth2/authorize?" + params.toString();
}

// On returning from Dropbox, exchange the ?code=... for an access token.
async function dbxCompleteLogin(code) {
  const verifier = sessionStorage.getItem("dbx_verifier");
  if (!verifier) throw new Error("Missing PKCE verifier");
  const body = new URLSearchParams({
    code,
    grant_type: "authorization_code",
    client_id: DROPBOX_APP_KEY,
    code_verifier: verifier,
    redirect_uri: dbxRedirectUri(),
  });
  const res = await fetch("https://api.dropboxapi.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body.toString(),
  });
  if (!res.ok) throw new Error("Token exchange failed: " + res.status);
  const data = await res.json();
  sessionStorage.removeItem("dbx_verifier");
  // Token held in memory + sessionStorage only (clears when browser/app fully closed)
  const token = { access_token: data.access_token, obtained: Date.now() };
  sessionStorage.setItem("dbx_token", JSON.stringify(token));
  return token;
}

function dbxGetToken() {
  try {
    const raw = sessionStorage.getItem("dbx_token");
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}
function dbxClearToken() {
  sessionStorage.removeItem("dbx_token");
}

// Create a folder (ignore "already exists" errors)
async function dbxCreateFolder(path) {
  const token = dbxGetToken();
  if (!token) throw new Error("Not connected to Dropbox");
  const res = await fetch("https://api.dropboxapi.com/2/files/create_folder_v2", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token.access_token,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({ path, autorename: false }),
  });
  if (res.ok) return await res.json();
  const err = await res.json().catch(() => ({}));
  // 409 conflict = folder already exists, which is fine
  if (err && err.error_summary && err.error_summary.startsWith("path/conflict")) return null;
  throw new Error("Folder create failed: " + (err.error_summary || res.status));
}

// Upload a file (content can be a Blob or string)
async function dbxUpload(path, content) {
  const token = dbxGetToken();
  if (!token) throw new Error("Not connected to Dropbox");
  const res = await fetch("https://content.dropboxapi.com/2/files/upload", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token.access_token,
      "Content-Type": "application/octet-stream",
      "Dropbox-API-Arg": JSON.stringify({ path, mode: "overwrite", autorename: false, mute: true }),
    },
    body: content,
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error("Upload failed: " + err.slice(0, 120));
  }
  return await res.json();
}

// App-folder access: paths are relative to the app's dedicated folder, so we
// just use "/ParentFolder/SUBFOLDER/file". Dropbox scopes it automatically.
function dbxProjectPaths(parentFolder) {
  const safe = (parentFolder || "FieldSurvey").replace(/[^A-Za-z0-9 _-]/g, "").trim() || "FieldSurvey";
  return {
    parent: "/" + safe,
    data: "/" + safe + "/DATA",
    photos: "/" + safe + "/PHOTOS",
  };
}


// ---------- Helpers ----------
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function haversineFeet(lat1, lon1, lat2, lon2) {
  const R = 20902231; // earth radius in feet
  const toRad = (d) => (d * Math.PI) / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a =
    Math.sin(dLat / 2) ** 2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function pad3(n) {
  return String(n).padStart(3, "0");
}

// Compass bearing from point 1 to point 2, in degrees (0=N, 90=E, 180=S, 270=W)
function bearingDegrees(lat1, lon1, lat2, lon2) {
  const toRad = (d) => (d * Math.PI) / 180;
  const toDeg = (r) => (r * 180) / Math.PI;
  const dLon = toRad(lon2 - lon1);
  const y = Math.sin(dLon) * Math.cos(toRad(lat2));
  const x =
    Math.cos(toRad(lat1)) * Math.sin(toRad(lat2)) -
    Math.sin(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.cos(dLon);
  let brng = toDeg(Math.atan2(y, x));
  return (brng + 360) % 360;
}

// Convert a bearing in degrees to a compass label like "NE" or "SSW"
function compassLabel(deg) {
  const dirs = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
  return dirs[Math.round(deg / 22.5) % 16];
}

// Shared audio context (created lazily on first user interaction)
let _audioCtx = null;
function getAudioCtx() {
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === "suspended") _audioCtx.resume();
    return _audioCtx;
  } catch (e) {
    return null;
  }
}

// Bright, quick single ding — used when the Mark Waypoint button is pressed.
function playWaypointDing() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(1320, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.08);
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.35, ctx.currentTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.22);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.24);
}

// Two-tone alert chime — used for proximity detection.
function playProximityChime() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const tone = (freq, start, dur, peak) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, ctx.currentTime + start);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(peak, ctx.currentTime + start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.02);
  };
  tone(880, 0, 0.45, 0.3);
  tone(1180, 0.15, 0.4, 0.25);
}

// Soft, almost haptic-like tick — used for general button presses.
function playSoftTick() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = "sine";
  osc.frequency.setValueAtTime(180, ctx.currentTime);
  gain.gain.setValueAtTime(0.0001, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.005);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.06);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.07);
}


async function storageGet(key, fallback) {
  try {
    const raw = localStorage.getItem(STORAGE_PREFIX + ":" + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
async function storageSet(key, value) {
  try {
    localStorage.setItem(STORAGE_PREFIX + ":" + key, JSON.stringify(value));
  } catch (e) {
    console.error("storage set failed", e);
    if (e.name === "QuotaExceededError") {
      alert("Storage is full. Export your data and consider removing old photos to free up space.");
    }
  }
}

// ---------- Main App ----------
function FieldSurveyApp() {
  const [view, setView] = useState("projects"); // projects, templates, capture, waypointList, map, settings, export, findWaypoint
  const [monitoring, setMonitoring] = useState(true);
  const [projects, setProjects] = useState([]);
  const [templates, setTemplates] = useState([]);
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [findTargetId, setFindTargetId] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [dbxConnected, setDbxConnected] = useState(!!dbxGetToken());

  // Handle return from Dropbox OAuth (URL will contain ?code=...)
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
      (async () => {
        try {
          await dbxCompleteLogin(code);
          setDbxConnected(true);
        } catch (e) {
          console.warn("Dropbox login failed", e);
          alert("Dropbox connection failed. Please try connecting again.");
        }
        // Clean the ?code= out of the URL and restore where the user was
        window.history.replaceState({}, document.title, window.location.pathname);
        const ret = sessionStorage.getItem("dbx_return");
        if (ret) {
          try {
            const r = JSON.parse(ret);
            if (r.projectId) { setActiveProjectId(r.projectId); setView(r.view || "settings"); }
          } catch (e) {}
          sessionStorage.removeItem("dbx_return");
        }
      })();
    }
  }, []);

  useEffect(() => {
    (async () => {
      const p = await storageGet("projects:index", []);
      setProjects(p);
      const t = await storageGet("templates:index", []);
      setTemplates(t);
      setLoaded(true);
    })();
  }, []);

  useEffect(() => {
    if (loaded) storageSet("projects:index", projects);
  }, [projects, loaded]);

  useEffect(() => {
    if (loaded) storageSet("templates:index", templates);
  }, [templates, loaded]);

  const activeProject = projects.find((p) => p.id === activeProjectId);

  const updateProject = useCallback((id, patch) => {
    setProjects((prev) => prev.map((p) => (p.id === id ? { ...p, ...patch } : p)));
  }, []);

  if (!loaded) {
    return (
      <div style={{ ...screenStyle, alignItems: "center", justifyContent: "center" }}>
        <div style={{ color: COLORS.ink, fontFamily: "ui-monospace, monospace", letterSpacing: 1 }}>
          LOADING…
        </div>
      </div>
    );
  }

  return (
    <div style={screenStyle}>
      <style>{globalCss}</style>
      {view === "projects" && (
        <ProjectsScreen
          projects={projects}
          setProjects={setProjects}
          templates={templates}
          onOpen={(id) => {
            setActiveProjectId(id);
            setView("capture");
          }}
          onNav={setView}
        />
      )}
      {view === "templates" && (
        <TemplatesScreen
          templates={templates}
          setTemplates={setTemplates}
          onBack={() => setView("projects")}
        />
      )}
      {view === "capture" && activeProject && (
        <CaptureScreen
          project={activeProject}
          updateProject={(patch) => updateProject(activeProject.id, patch)}
          onBack={() => setView("projects")}
          onNav={setView}
          monitoring={monitoring}
          setMonitoring={setMonitoring}
          setFindTargetId={setFindTargetId}
        />
      )}
      {view === "waypointList" && activeProject && (
        <WaypointListScreen
          project={activeProject}
          updateProject={(patch) => updateProject(activeProject.id, patch)}
          onBack={() => setView("capture")}
          onNav={setView}
        />
      )}
      {view === "map" && activeProject && (
        <MapScreen project={activeProject} onBack={() => setView("capture")} />
      )}
      {view === "findWaypoint" && activeProject && (
        <FindWaypointScreen
          project={activeProject}
          initialWaypointId={findTargetId}
          onBack={() => { setFindTargetId(null); setView("capture"); }}
        />
      )}
      {view === "settings" && activeProject && (
        <SettingsScreen
          project={activeProject}
          updateProject={(patch) => updateProject(activeProject.id, patch)}
          onBack={() => setView("capture")}
          dbxConnected={dbxConnected}
          setDbxConnected={setDbxConnected}
        />
      )}
      {view === "export" && activeProject && (
        <ExportScreen project={activeProject} onBack={() => setView("capture")} />
      )}
    </div>
  );
}

function PrimaryButton({ children, onClick, style, disabled, icon, silent }) {
  return (
    <button
      onClick={(e) => { if (!silent) playSoftTick(); onClick && onClick(e); }}

// ---------- Capture Screen (main hub for a project) ----------
function CaptureScreen({ project, updateProject, onBack, onNav, monitoring, setMonitoring, setFindTargetId }) {
  const [gettingLoc, setGettingLoc] = useState(false);
  const [pendingWaypoint, setPendingWaypoint] = useState(null); // {lat, lon, locationNum}
  const [proximityAlert, setProximityAlert] = useState(null); // waypoint object
  const watchIdRef = useRef(null);
  const alertedRecentlyRef = useRef({}); // id -> timestamp to debounce repeated dings

  // GPS monitoring loop
  useEffect(() => {
    if (!monitoring || !("geolocation" in navigator)) return;
    const id = navigator.geolocation.watchPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        for (const wp of project.waypoints) {
          const dist = haversineFeet(latitude, longitude, wp.lat, wp.lon);
          if (dist <= project.proximityThresholdFeet) {
            const lastAlert = alertedRecentlyRef.current[wp.id] || 0;
            const now = Date.now();
            if (now - lastAlert > 60000) {
              alertedRecentlyRef.current[wp.id] = now;
              playProximityChime();
              setProximityAlert(wp);
            }
          }
        }
      },
      (err) => console.warn("geo watch error", err),
      { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
    );
    watchIdRef.current = id;
    return () => navigator.geolocation.clearWatch(id);
  }, [monitoring, project.waypoints, project.proximityThresholdFeet]);

  function markLocation() {
    playWaypointDing();
    setGettingLoc(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        setGettingLoc(false);
        setPendingWaypoint({
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          locationNum: project.nextLocationNum,
        });
      },
      (err) => {
        setGettingLoc(false);
        alert("Could not get location: " + err.message);
      },
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }

  function saveWaypoint(waypointData) {
    const { _incrementPhoto, ...cleanData } = waypointData;
    const newWp = { id: uid(), createdAt: new Date().toISOString(), ...cleanData };
    updateProject({
      waypoints: [...project.waypoints, newWp],
      nextLocationNum: project.nextLocationNum + 1,
      nextPhotoNum: _incrementPhoto ? (project.nextPhotoNum || 1) + 1 : (project.nextPhotoNum || 1),
    });
    setPendingWaypoint(null);
  }

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <TopBar
        title={project.name}
        onBack={onBack}
        right={
          <button
            onClick={() => onNav("settings")}
            style={{ background: "none", border: "none", color: COLORS.card, padding: 6 }}
            aria-label="Settings"
          >
            <Settings size={22} />
          </button>
        }
      />

      <div style={{ padding: 16, flex: 1, display: "flex", flexDirection: "column", gap: 16 }}>
        <div
          style={{
            background: monitoring ? "#DCE8D5" : COLORS.card,
            border: `1.5px solid ${monitoring ? "#6B8F5C" : COLORS.line}`,
            borderRadius: 10,
            padding: "10px 14px",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            fontSize: 13,
          }}
        >
          <span style={{ fontWeight: 700, color: monitoring ? "#3A5C2E" : COLORS.inkSoft }}>
            {monitoring ? `● Monitoring active (±${project.proximityThresholdFeet} ft)` : "○ Monitoring paused"}
          </span>
          <button
            onClick={() => setMonitoring((m) => !m)}
            style={{
              background: "none",
              border: `1.5px solid ${monitoring ? "#3A5C2E" : COLORS.ink}`,
              borderRadius: 6,
              padding: "4px 10px",
              fontWeight: 700,
              fontSize: 12,
              color: monitoring ? "#3A5C2E" : COLORS.ink,
            }}
          >
            {monitoring ? "Pause" : "Resume"}
          </button>
        </div>

        <button
          onClick={markLocation}
          disabled={gettingLoc}
          style={{
            background: COLORS.rust,
            color: "#fff",
            border: "none",
            borderRadius: 16,
            padding: "40px 20px",
            display: "flex",
            flexDirection: "column",
            alignItems: "center",
            gap: 10,
            boxShadow: `0 3px 0 ${COLORS.rustDark}`,
          }}
        >
          <MapPin size={44} />
          <span style={{ fontWeight: 800, fontSize: 20, letterSpacing: 0.5 }}>
            {gettingLoc ? "GETTING LOCATION…" : "MARK WAYPOINT"}
          </span>
          <span style={{ fontSize: 13, opacity: 0.9, fontFamily: "ui-monospace, monospace" }}>
            Next: Location {pad3(project.nextLocationNum)}
          </span>
        </button>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <SecondaryButton onClick={() => onNav("waypointList")} icon={<List size={18} />}>
            Waypoints ({project.waypoints.length})
          </SecondaryButton>
          <SecondaryButton onClick={() => onNav("map")} icon={<MapIcon size={18} />}>
            Relative Point Map
          </SecondaryButton>
        </div>
        <SecondaryButton
          onClick={() => { setFindTargetId(null); onNav("findWaypoint"); }}
          icon={<Navigation size={18} />}
          disabled={project.waypoints.length === 0}
        >
          Find Waypoint
        </SecondaryButton>
        <PrimaryButton onClick={() => onNav("export")} icon={<Upload size={18} />} style={{ background: COLORS.ink, boxShadow: "0 2px 0 #182019" }}>
          Export Data
        </PrimaryButton>
        <SecondaryButton
          onClick={onBack}
          icon={<X size={18} />}
          style={{ borderColor: COLORS.rust, color: COLORS.rust }}
        >
          Conclude Session &amp; Return to Projects
        </SecondaryButton>
      </div>

      {pendingWaypoint && (
        <AttributeFormModal
          project={project}
          waypoint={pendingWaypoint}
          onSave={saveWaypoint}
          onCancel={() => setPendingWaypoint(null)}
        />
      )}

      {proximityAlert && (
        <ProximityAlertModal
          waypoint={proximityAlert}
          onYes={() => {
            setProximityAlert(null);
            onNav("waypointList");
          }}
          onPointTo={() => {
            const wpId = proximityAlert.id;
            setProximityAlert(null);
            setFindTargetId(wpId);
            onNav("findWaypoint");
          }}
          onNo={() => setProximityAlert(null)}
        />
      )}
    </div>
  );
}

function AttributeFormModal({ project, waypoint, onSave, onCancel }) {

    project.customFields.forEach((f) => (init[f.id] = ""));

  });
  // Auto-assign next sequential photo name for this project
  const autoName = `Pic${String(project.nextPhotoNum || 1).padStart(3, "0")}`;
  const [photoRef, setPhotoRef] = useState(null);   // filename stored once captured/uploaded
  const [uploadState, setUploadState] = useState("idle"); // idle | uploading | done | queued | error
  const [uploadMsg, setUploadMsg] = useState("");
  const fileInputRef = useRef(null);

  const dbxConnected = !!dbxGetToken();

  function openCamera() {
    if (fileInputRef.current) fileInputRef.current.click();
  }

  async function handlePhotoFile(e) {
    const file = e.target.files && e.target.files[0];
    e.target.value = ""; // allow re-pick
    if (!file) return;
    const filename = `${autoName}.jpg`;
    const folder = project.dropboxParentFolder || "";

    if (!dbxConnected) {
      // No Dropbox connection — record the reference name but can't upload
      setPhotoRef(filename);
      setUploadState("error");
      setUploadMsg("Not connected to Dropbox — name recorded, but photo not uploaded. Connect Dropbox in Project Setup, then retake.");
      return;
    }
    if (!folder) {
      setPhotoRef(filename);
      setUploadState("error");
      setUploadMsg("No Dropbox folder set for this project. Set one in Project Setup, then retake.");
      return;
    }

    setUploadState("uploading");
    setUploadMsg("Uploading to Dropbox…");
    try {
      const paths = dbxProjectPaths(folder);
      // Ensure folders exist (cheap if already there)
      await dbxCreateFolder(paths.parent);
      await dbxCreateFolder(paths.photos);
      await dbxUpload(`${paths.photos}/${filename}`, file);
      setPhotoRef(filename);
      setUploadState("done");
      setUploadMsg(`Uploaded to ${paths.photos}/${filename}`);
    } catch (err) {
      // Queue for later if upload fails (e.g. no signal)
      setPhotoRef(filename);
      setUploadState("queued");
      setUploadMsg("Upload failed (no connection?). Name recorded; you can retake when back in range.");
    }
  }

  function handleSave() {
    onSave({
      locationNum: waypoint.locationNum,
      description,
      lat: waypoint.lat,
      lon: waypoint.lon,
      photoRef,
      _incrementPhoto: photoRef !== null,
      customValues,
    });
  }

  return (
    <div style={modalOverlayStyle}>
      <div style={{ ...modalCardStyle, maxHeight: "92vh", display: "flex", flexDirection: "column" }}>

          <div>

            <div style={{ fontSize: 12, color: COLORS.inkSoft, fontFamily: "ui-monospace, monospace" }}>

            </div>
          </div>
        </div>

        <div style={{ padding: 16, overflowY: "auto", flex: 1 }}>
          <label style={labelStyle}>Notes</label>
          <textarea
            value={description}
            onChange={(e) => setDescription(e.target.value.slice(0, 200))}
            placeholder="What's here? (max 200 characters)"
            style={{ ...inputStyle, minHeight: 70, resize: "vertical" }}
          />
          <div style={{ fontSize: 11, color: COLORS.inkSoft, textAlign: "right", marginTop: 2 }}>
            {description.length}/200
          </div>

          {project.customFields.map((field) => (
            <div key={field.id} style={{ marginTop: 14 }}>
              <label style={labelStyle}>{field.label}</label>
              {field.type === "dropdown" ? (
                <EditableDropdown
                  options={field.options}
                  value={customValues[field.id]}
                  onChange={(v) => setCustomValues((prev) => ({ ...prev, [field.id]: v }))}
                />
              ) : (
                <input
                  value={customValues[field.id] || ""}
                  onChange={(e) =>
                    setCustomValues((prev) => ({ ...prev, [field.id]: e.target.value }))
                  }
                  style={inputStyle}
                  placeholder={field.label}
                />
              )}
            </div>
          ))}

          <div style={{ marginTop: 16 }}>
            <label style={labelStyle}>Photo</label>
            {photoRef ? (
              <div style={{
                background: uploadState === "done" ? "#DCE8D5" : (uploadState === "uploading" ? "#FBEFD6" : "#FBE3D6"),
                border: `1.5px solid ${uploadState === "done" ? "#6B8F5C" : COLORS.line}`,

                  </div>
                  <button

                    style={{ background: "none", border: "none", color: COLORS.rust, padding: 6, flexShrink: 0 }}
                    aria-label="Remove photo"
                  >
                    <X size={18} />
                  </button>
                </div>
                {(uploadState === "error" || uploadState === "queued") && (
                  <button onClick={openCamera} style={{
                    marginTop: 10, width: "100%", background: COLORS.rust, color: "#fff",
                    border: "none", borderRadius: 8, padding: "10px", fontWeight: 700, fontSize: 13,

function EditableDropdown({ options, value, onChange }) {
  const [customMode, setCustomMode] = useState(!options.includes(value) && value);
  if (customMode) {
    return (
      <input
        value={value || ""}
        onChange={(e) => onChange(e.target.value)}
        style={inputStyle}
        placeholder="Custom value"
      />
    );
  }
  return (
    <select
      value={value || ""}
      onChange={(e) => {
        if (e.target.value === "__custom__") {
          setCustomMode(true);
          onChange("");
        } else {
          onChange(e.target.value);
        }
      }}
      style={{ ...inputStyle, appearance: "none" }}
    >
      <option value="" disabled>
        Select…
      </option>
      {options.map((opt) => (
        <option key={opt} value={opt}>
          {opt}
        </option>
      ))}
      <option value="__custom__">Other (type custom)…</option>
    </select>
  );
}

function FindWaypointScreen({ project, initialWaypointId, onBack }) {
  const sorted = [...project.waypoints].sort((a, b) => a.locationNum - b.locationNum);
  const [targetId, setTargetId] = useState(initialWaypointId || (sorted[0] && sorted[0].id) || null);
  const [pos, setPos] = useState(null); // {lat, lon}
  const [heading, setHeading] = useState(null); // device compass heading in degrees, or null
  const [compassMode, setCompassMode] = useState("unknown"); // unknown | live | assumed
  const watchRef = useRef(null);

  const target = project.waypoints.find((w) => w.id === targetId);

  // Live GPS position
  useEffect(() => {
    if (!("geolocation" in navigator)) return;
    const id = navigator.geolocation.watchPosition(
      (p) => setPos({ lat: p.coords.latitude, lon: p.coords.longitude }),
      (e) => console.warn("geo error", e),
      { enableHighAccuracy: true, maximumAge: 1000, timeout: 12000 }
    );
    watchRef.current = id;
    return () => navigator.geolocation.clearWatch(id);
  }, []);

  // Device compass (best-effort; falls back to "assumed north")
  useEffect(() => {
    function handleOrientation(e) {
      let h = null;
      if (typeof e.webkitCompassHeading === "number") {
        h = e.webkitCompassHeading; // iOS gives true heading here
      } else if (e.alpha != null) {
        h = 360 - e.alpha; // approximate for other browsers
      }
      if (h != null && !isNaN(h)) {
        setHeading(h);
        setCompassMode("live");
      }
    }
    window.addEventListener("deviceorientation", handleOrientation, true);
    // If no compass event arrives shortly, fall back to assumed-north mode
    const fallbackTimer = setTimeout(() => {
      setCompassMode((m) => (m === "live" ? m : "assumed"));
    }, 2500);
    return () => {
      window.removeEventListener("deviceorientation", handleOrientation, true);
      clearTimeout(fallbackTimer);
    };
  }, []);

  function requestCompass() {
    // iOS 13+ requires explicit permission for orientation
    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {
      DeviceOrientationEvent.requestPermission().catch(() => {});
    }
  }

  const dist = pos && target ? haversineFeet(pos.lat, pos.lon, target.lat, target.lon) : null;
  const brng = pos && target ? bearingDegrees(pos.lat, pos.lon, target.lat, target.lon) : null;
  // Arrow rotation: if live compass available, subtract heading so arrow points
  // relative to where the phone is actually facing. Otherwise assume top = north.
  const effectiveHeading = compassMode === "live" && heading != null ? heading : 0;
  const arrowRotation = brng != null ? brng - effectiveHeading : 0;

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <TopBar title="Find Waypoint" onBack={onBack} />
      <div style={{ padding: 16, flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 16 }}>

        {sorted.length === 0 ? (
          <div style={{ textAlign: "center", color: COLORS.inkSoft, marginTop: 40 }}>
            No waypoints recorded yet.
          </div>
        ) : (
          <>
            <div>
              <label style={labelStyle}>Target waypoint</label>
              <select
                value={targetId || ""}
                onChange={(e) => setTargetId(e.target.value)}
                style={{ ...inputStyle, appearance: "none" }}
              >
                {sorted.map((w) => (
                  <option key={w.id} value={w.id}>
                    Location {pad3(w.locationNum)}{w.description ? ` — ${w.description.slice(0, 30)}` : ""}
                  </option>
                ))}
              </select>
            </div>

            {/* Compass / direction display */}
            <div style={{
              background: COLORS.card,
              border: `1px solid ${COLORS.line}`,
              borderRadius: 16,
              padding: 24,
              display: "flex",
              flexDirection: "column",
              alignItems: "center",
              gap: 12,
            }}>
              <div style={{
                width: 180,
                height: 180,
                borderRadius: "50%",
                border: `3px solid ${COLORS.line}`,
                position: "relative",
                display: "flex",
                alignItems: "center",
                justifyContent: "center",
                background: COLORS.bg,
              }}>
                {/* N marker */}
                <div style={{ position: "absolute", top: 6, fontSize: 12, fontWeight: 800, color: COLORS.inkSoft }}>N</div>
                <div style={{ position: "absolute", bottom: 6, fontSize: 11, color: COLORS.inkSoft }}>S</div>
                <div style={{ position: "absolute", left: 8, fontSize: 11, color: COLORS.inkSoft }}>W</div>
                <div style={{ position: "absolute", right: 8, fontSize: 11, color: COLORS.inkSoft }}>E</div>
                {/* Arrow */}
                <div style={{
                  transform: `rotate(${arrowRotation}deg)`,
                  transition: "transform 0.3s ease-out",
                  width: 0,
                  height: 0,
                }}>
                  <div style={{
                    width: 0, height: 0,
                    borderLeft: "18px solid transparent",
                    borderRight: "18px solid transparent",
                    borderBottom: `70px solid ${COLORS.rust}`,
                    transform: "translateY(-35px)",
                  }} />
                </div>
              </div>

              {dist != null ? (
                <>
                  <div style={{ fontSize: 36, fontWeight: 800, color: COLORS.ink, fontFamily: "ui-monospace, monospace" }}>
                    {dist < 1000 ? `${Math.round(dist)} ft` : `${(dist / 5280).toFixed(2)} mi`}
                  </div>
                  <div style={{ fontSize: 16, color: COLORS.inkSoft }}>
                    Bearing <strong style={{ color: COLORS.rust }}>{Math.round(brng)}° {compassLabel(brng)}</strong>
                  </div>
                </>
              ) : (
                <div style={{ color: COLORS.inkSoft, fontSize: 14 }}>Acquiring your location…</div>
              )}
            </div>

            {/* Compass mode note */}
            {compassMode === "assumed" && (
              <div style={{
                background: "#FBEFD6",
                border: `1.5px solid ${COLORS.amber}`,
                borderRadius: 10,
                padding: "12px 14px",
                fontSize: 13,
                color: COLORS.ink,
                lineHeight: 1.5,
              }}>
                <strong>Compass not available — assuming phone points north.</strong> Keep the top of your phone pointed north (use your device Compass app or an analog compass), and the arrow will point true toward the waypoint.
                <button onClick={requestCompass} style={{
                  display: "block", marginTop: 8, background: COLORS.amber, color: "#fff",
                  border: "none", borderRadius: 8, padding: "8px 12px", fontWeight: 700, fontSize: 13,
                }}>
                  Try enabling live compass
                </button>
              </div>
            )}
            {compassMode === "live" && (
              <div style={{
                background: "#DCE8D5",
                border: `1.5px solid #6B8F5C`,
                borderRadius: 10,
                padding: "10px 14px",
                fontSize: 13,
                color: "#2E4427",
              }}>
                ● Live compass active — point your phone and follow the arrow.
              </div>
            )}
            {compassMode === "unknown" && (
              <button onClick={requestCompass} style={{
                background: COLORS.card, border: `2px solid ${COLORS.ink}`, borderRadius: 10,
                padding: "12px", fontWeight: 700, color: COLORS.ink,
              }}>
                Enable Compass
              </button>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ---------- Map Screen ----------
function MapScreen({ project, onBack }) {
  const waypoints = project.waypoints;
  if (waypoints.length === 0) {
    return (
      <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
        <TopBar title="Relative Point Map" onBack={onBack} />
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", color: COLORS.inkSoft }}>
          No waypoints to show yet.
        </div>
      </div>
    );
  }

  const lats = waypoints.map((w) => w.lat);
  const lons = waypoints.map((w) => w.lon);
  const minLat = Math.min(...lats), maxLat = Math.max(...lats);
  const minLon = Math.min(...lons), maxLon = Math.max(...lons);
  const padLat = Math.max((maxLat - minLat) * 0.15, 0.0008);
  const padLon = Math.max((maxLon - minLon) * 0.15, 0.0008);
  const viewMinLat = minLat - padLat, viewMaxLat = maxLat + padLat;
  const viewMinLon = minLon - padLon, viewMaxLon = maxLon + padLon;

  const W = 100, H = 100;
  function project_(lat, lon) {
    const x = ((lon - viewMinLon) / (viewMaxLon - viewMinLon)) * W;
    const y = H - ((lat - viewMinLat) / (viewMaxLat - viewMinLat)) * H;
    return { x, y };
  }

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <TopBar title="Relative Point Map" onBack={onBack} />
      <div style={{ flex: 1, position: "relative", background: "#D8CDA8", overflow: "hidden" }}>
        <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "100%" }} preserveAspectRatio="none">
          <defs>
            <pattern id="grid" width="5" height="5" patternUnits="userSpaceOnUse">
              <path d="M 5 0 L 0 0 0 5" fill="none" stroke="#C4B690" strokeWidth="0.15" />
            </pattern>
          </defs>
          <rect width={W} height={H} fill="url(#grid)" />
          {waypoints.map((wp) => {
            const { x, y } = project_(wp.lat, wp.lon);
            return (
              <g key={wp.id}>
                <circle cx={x} cy={y} r="2.6" fill={COLORS.rust} stroke="#fff" strokeWidth="0.5" />
              </g>
            );
          })}
        </svg>
        {waypoints.map((wp) => {
          const { x, y } = project_(wp.lat, wp.lon);
          return (
            <div
              key={wp.id}
              style={{
                position: "absolute",
                left: `${x}%`,
                top: `${y}%`,
                transform: "translate(-50%, -130%)",
                background: COLORS.ink,
                color: "#fff",
                fontSize: 10,
                fontFamily: "ui-monospace, monospace",
                fontWeight: 700,
                padding: "2px 5px",
                borderRadius: 4,
                whiteSpace: "nowrap",
                pointerEvents: "none",
              }}
            >
              {pad3(wp.locationNum)}
            </div>
          );
        })}
      </div>
      <div style={{ padding: 12, fontSize: 12, color: COLORS.inkSoft, textAlign: "center", background: COLORS.card }}>
        Simplified plot — {waypoints.length} point{waypoints.length !== 1 ? "s" : ""}. For full basemap detail, export to KML and open in Google Earth.
      </div>
    </div>
  );
}

// ---------- Settings Screen ----------
function SettingsScreen({ project, updateProject, onBack, dbxConnected, setDbxConnected }) {
  const [fields, setFields] = useState(project.customFields);
  const [threshold, setThreshold] = useState(project.proximityThresholdFeet);
  const [addingField, setAddingField] = useState(false);
  const [dropboxFolder, setDropboxFolder] = useState(project.dropboxParentFolder || "");
  const [dbxBusy, setDbxBusy] = useState(false);
  const [dbxMessage, setDbxMessage] = useState("");

  function persistFields(newFields) {
    setFields(newFields);
    updateProject({ customFields: newFields });
  }

  function deleteField(id) {
    persistFields(fields.filter((f) => f.id !== id));
  }

  async function connectDropbox() {
    // Save folder name and where to return after the Dropbox redirect
    updateProject({ dropboxParentFolder: dropboxFolder.trim() });
    sessionStorage.setItem("dbx_return", JSON.stringify({ projectId: project.id, view: "settings" }));
    try {
      await dbxBeginLogin();
    } catch (e) {
      setDbxMessage("Could not start Dropbox login: " + e.message);
    }
  }

  async function createDropboxFolders() {
    if (!dropboxFolder.trim()) { setDbxMessage("Enter a parent folder name first."); return; }
    updateProject({ dropboxParentFolder: dropboxFolder.trim() });
    setDbxBusy(true);
    setDbxMessage("");
    try {
      const paths = dbxProjectPaths(dropboxFolder.trim());
      await dbxCreateFolder(paths.parent);
      await dbxCreateFolder(paths.data);
      await dbxCreateFolder(paths.photos);
      setDbxMessage(`Created ${paths.parent} with DATA and PHOTOS subfolders.`);
    } catch (e) {
      setDbxMessage("Folder creation failed: " + e.message);
    }
    setDbxBusy(false);
  }

  function disconnectDropbox() {
    dbxClearToken();
    setDbxConnected(false);
    setDbxMessage("Disconnected. Your token was cleared from this device.");
  }

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <TopBar title="Project Setup" onBack={onBack} />
      <div style={{ padding: 16, flex: 1, overflowY: "auto" }}>
        <div style={{ background: COLORS.card, borderRadius: 12, padding: 16, border: `1px solid ${COLORS.line}`, marginBottom: 16 }}>
          <label style={labelStyle}>Proximity alert distance (feet)</label>
          <input
            type="number"
            value={threshold === 0 ? "" : threshold}
            onChange={(e) => {
              const raw = e.target.value;
              const v = raw === "" ? 0 : Math.max(0, Number(raw));
              setThreshold(v);
              updateProject({ proximityThresholdFeet: v });
            }}
            placeholder="e.g. 20"
            style={inputStyle}
          />
          <div style={{ fontSize: 12, color: COLORS.inkSoft, marginTop: 6 }}>
            GPS accuracy is typically 10–30 ft. Set this above your expected drift to avoid false alerts between close points.
          </div>
        </div>

        {/* Dropbox connection */}
        <div style={{ background: COLORS.card, borderRadius: 12, padding: 16, border: `1px solid ${COLORS.line}`, marginBottom: 16 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
            <div style={{
              width: 10, height: 10, borderRadius: "50%",
              background: dbxConnected ? "#3A5C2E" : "#B0A07C",
            }} />
            <span style={{ fontWeight: 800, fontSize: 15 }}>
              Dropbox {dbxConnected ? "connected" : "not connected"}
            </span>
          </div>

          <label style={labelStyle}>Project parent folder name</label>
          <input
            value={dropboxFolder}
            onChange={(e) => setDropboxFolder(e.target.value)}
            onBlur={() => updateProject({ dropboxParentFolder: dropboxFolder.trim() })}
            placeholder="e.g. StumpyLakeSurvey"
            style={inputStyle}
          />
          <div style={{ fontSize: 12, color: COLORS.inkSoft, marginTop: 6, marginBottom: 12 }}>
            This folder is created in your Dropbox app folder, with <strong>DATA</strong> and <strong>PHOTOS</strong> subfolders inside. Photos upload to PHOTOS; CSV/KML exports upload to DATA.
          </div>

          {!dbxConnected ? (
            <PrimaryButton onClick={connectDropbox} style={{ width: "100%" }}>
              Connect Dropbox & Create Project Folder
            </PrimaryButton>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <PrimaryButton onClick={createDropboxFolders} disabled={dbxBusy} style={{ width: "100%" }}>
                {dbxBusy ? "Creating folders…" : "Create / Verify Project Folder"}
              </PrimaryButton>
              <SecondaryButton onClick={disconnectDropbox} style={{ width: "100%", borderColor: COLORS.rust, color: COLORS.rust }}>
                Disconnect Dropbox
              </SecondaryButton>
            </div>
          )}
          {dbxMessage && (
            <div style={{ fontSize: 12, color: COLORS.ink, marginTop: 10, background: COLORS.bg, padding: "8px 10px", borderRadius: 8 }}>
              {dbxMessage}
            </div>
          )}
        </div>

        <div style={{ fontSize: 13, color: COLORS.inkSoft, fontWeight: 700, marginBottom: 10 }}>
          CUSTOM ATTRIBUTE FIELDS
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
          {fields.map((f) => (
            <div
              key={f.id}
              style={{
                background: COLORS.card,
                borderRadius: 10,
                padding: 12,
                border: `1px solid ${COLORS.line}`,
                display: "flex",
                justifyContent: "space-between",
                alignItems: "center",
              }}
            >
              <div>
                <div style={{ fontWeight: 700 }}>{f.label}</div>
                <div style={{ fontSize: 12, color: COLORS.inkSoft }}>
                  {f.type === "dropdown" ? `Dropdown: ${f.options.join(", ")}` : "Text field"}
                </div>
              </div>
              <button onClick={() => deleteField(f.id)} style={{ background: "none", border: "none", color: COLORS.rust, padding: 6 }}>
                <Trash2 size={18} />
              </button>
            </div>
          ))}
        </div>

        {addingField ? (
          <NewFieldForm
            onCancel={() => setAddingField(false)}
            onAdd={(field) => {
              persistFields([...fields, field]);
              setAddingField(false);
            }}
          />
        ) : (
          <button
            onClick={() => setAddingField(true)}
            style={{
              width: "100%",
              background: "none",
              border: `2px solid ${COLORS.ink}`,
              borderRadius: 10,
              padding: 14,
              display: "flex",
              alignItems: "center",
              justifyContent: "center",
              gap: 8,
              fontWeight: 700,
            }}
          >
            <Plus size={18} /> Add Custom Field
          </button>
        )}

        <div style={{ marginTop: 24, fontSize: 12, color: COLORS.inkSoft, lineHeight: 1.5 }}>
          Default fields (Location number, Notes, Latitude, Longitude) apply to every waypoint and can't be removed.
        </div>
      </div>
    </div>
  );
}

function NewFieldForm({ onAdd, onCancel }) {
  const [label, setLabel] = useState("");
  const [type, setType] = useState("text");
  const [options, setOptions] = useState([]);
  const [optionDraft, setOptionDraft] = useState("");

  function addOption() {
    const val = optionDraft.trim();
    if (!val) return;
    if (options.includes(val)) {
      setOptionDraft("");
      return;
    }
    setOptions((prev) => [...prev, val]);
    setOptionDraft("");
  }

  function removeOption(opt) {
    setOptions((prev) => prev.filter((o) => o !== opt));
  }

  function add() {
    if (!label.trim()) return;
    if (type === "dropdown" && options.length === 0) return;
    onAdd({ id: uid(), label: label.trim(), type, options: type === "dropdown" ? options : [] });
  }

  return (
    <div style={{ background: COLORS.card, borderRadius: 12, padding: 16, border: `1px solid ${COLORS.line}` }}>
      <label style={labelStyle}>Field label</label>
      <input value={label} onChange={(e) => setLabel(e.target.value)} style={inputStyle} placeholder="e.g. Hardware Type" />
      <label style={{ ...labelStyle, marginTop: 12 }}>Field type</label>
      <div style={{ display: "flex", gap: 8 }}>
        <button
          onClick={() => setType("text")}
          style={{
            flex: 1,
            padding: 10,
            borderRadius: 8,
            border: `2px solid ${type === "text" ? COLORS.rust : COLORS.line}`,
            background: type === "text" ? "#F3E4D8" : "#fff",
            fontWeight: 700,
            color: COLORS.ink,
          }}
        >
          Text
        </button>
        <button
          onClick={() => setType("dropdown")}
          style={{
            flex: 1,
            padding: 10,
            borderRadius: 8,
            border: `2px solid ${type === "dropdown" ? COLORS.rust : COLORS.line}`,
            background: type === "dropdown" ? "#F3E4D8" : "#fff",
            fontWeight: 700,
            color: COLORS.ink,
          }}
        >
          Dropdown
        </button>
      </div>
      {type === "dropdown" && (
        <>
          <label style={{ ...labelStyle, marginTop: 12 }}>Add an option</label>
          <div style={{ display: "flex", gap: 8 }}>
            <input
              value={optionDraft}
              onChange={(e) => setOptionDraft(e.target.value)}
              onKeyDown={(e) => {
                if (e.key === "Enter") {
                  e.preventDefault();
                  addOption();
                }
              }}
              style={{ ...inputStyle, flex: 1 }}
              placeholder="e.g. Operational"
            />
            <button
              onClick={addOption}
              type="button"
              style={{
                background: COLORS.ink,
                color: "#fff",
                border: "none",
                borderRadius: 8,
                padding: "0 18px",
                fontWeight: 700,
              }}
            >
              Add
            </button>
          </div>
          {options.length > 0 && (
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginTop: 10 }}>
              {options.map((opt) => (
                <div
                  key={opt}
                  style={{
                    display: "flex",
                    alignItems: "center",
                    gap: 6,
                    background: "#fff",
                    border: `1.5px solid ${COLORS.line}`,
                    borderRadius: 20,
                    padding: "6px 8px 6px 14px",
                    fontSize: 14,
                    fontWeight: 600,
                  }}
                >
                  {opt}
                  <button
                    onClick={() => removeOption(opt)}
                    style={{
                      background: COLORS.line,
                      border: "none",
                      borderRadius: "50%",
                      width: 20,
                      height: 20,
                      display: "flex",
                      alignItems: "center",
                      justifyContent: "center",
                      padding: 0,
                      color: COLORS.ink,
                    }}
                    aria-label={`Remove ${opt}`}
                  >
                    <X size={12} />
                  </button>
                </div>
              ))}
            </div>
          )}
          {options.length === 0 && (
            <div style={{ fontSize: 12, color: COLORS.inkSoft, marginTop: 8 }}>
              Add at least one option before saving this field.
            </div>
          )}
        </>
      )}
      <div style={{ display: "flex", gap: 10, marginTop: 14 }}>
        <SecondaryButton onClick={onCancel} style={{ flex: 1 }}>
          Cancel
        </SecondaryButton>
        <PrimaryButton onClick={add} style={{ flex: 1 }}>
          Add Field
        </PrimaryButton>
      </div>
    </div>
  );
}

// ---------- Export Screen ----------
function ExportScreen({ project, onBack }) {
  const [busy, setBusy] = useState(null);
  const [dbxMsg, setDbxMsg] = useState("");
  const dbxConnected = !!dbxGetToken();

  function download(filename, content, mime) {
    const blob = new Blob([content], { type: mime });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  // Upload an export to the project's Dropbox DATA folder (if connected).
  async function deliverToDropbox(filename, content, mime) {
    if (!dbxConnected) return;
    const folder = project.dropboxParentFolder;
    if (!folder) { setDbxMsg("No Dropbox folder set in Project Setup — saved locally only."); return; }
    try {
      const paths = dbxProjectPaths(folder);
      await dbxCreateFolder(paths.parent);
      await dbxCreateFolder(paths.data);
      const blob = new Blob([content], { type: mime });
      await dbxUpload(`${paths.data}/${filename}`, blob);
      setDbxMsg(`Uploaded to ${paths.data}/${filename}`);
    } catch (e) {
      setDbxMsg("Dropbox upload failed (saved locally): " + e.message);
    }
  }

  function buildRows() {
    const sorted = [...project.waypoints].sort((a, b) => a.locationNum - b.locationNum);
    return sorted.map((wp) => {
      const row = {
        Location: pad3(wp.locationNum),
        Notes: wp.description || "",
        Latitude: wp.lat,
        Longitude: wp.lon,
      };
      project.customFields.forEach((f) => {
        row[f.label] = (wp.customValues && wp.customValues[f.id]) || "";
      });
      row.Image = wp.photoRef || "no photo taken";
      return row;
    });
  }

  async function exportCSV() {
    setBusy("csv");
    setDbxMsg("");
    const rows = buildRows();
    if (rows.length === 0) {
      alert("No waypoints to export.");
      setBusy(null);
      return;
    }
    const headers = Object.keys(rows[0]);
    const csvLines = [headers.join(",")];
    rows.forEach((row) => {
      csvLines.push(
        headers
          .map((h) => {
            const val = String(row[h]).replace(/"/g, '""');
            return `"${val}"`;
          })
          .join(",")
      );
    });
    const content = csvLines.join("\n");
    const fname = `${project.name.replace(/\s+/g, "_")}.csv`;
    download(fname, content, "text/csv");
    await deliverToDropbox(fname, content, "text/csv");
    setBusy(null);
  }

  async function exportGeoJSON() {
    setBusy("geojson");
    setDbxMsg("");
    const sorted = [...project.waypoints].sort((a, b) => a.locationNum - b.locationNum);
    const geojson = {
      type: "FeatureCollection",
      features: sorted.map((wp) => {
        const props = {
          Location: pad3(wp.locationNum),
          Notes: wp.description || "",
        };
        project.customFields.forEach((f) => {
          props[f.label] = (wp.customValues && wp.customValues[f.id]) || "";
        });
        props.Image = wp.photoRef || "no photo taken";
        return {
          type: "Feature",
          geometry: { type: "Point", coordinates: [wp.lon, wp.lat] },
          properties: props,
        };
      }),
    };
    const content = JSON.stringify(geojson, null, 2);
    const fname = `${project.name.replace(/\s+/g, "_")}.geojson`;
    download(fname, content, "application/geo+json");
    await deliverToDropbox(fname, content, "application/geo+json");
    setBusy(null);
  }

  function escapeXml(str) {
    return String(str).replace(/[<>&'"]/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", "'": "&apos;", '"': "&quot;" }[c]));
  }

  async function exportKML() {
    setBusy("kml");
    setDbxMsg("");
    const sorted = [...project.waypoints].sort((a, b) => a.locationNum - b.locationNum);
    const placemarks = sorted
      .map((wp) => {
        const extData = project.customFields
          .map((f) => {
            const val = (wp.customValues && wp.customValues[f.id]) || "";
            return `<Data name="${escapeXml(f.label)}"><value>${escapeXml(val)}</value></Data>`;
          })
          .join("");
        return `<Placemark>
  <name>Location ${pad3(wp.locationNum)}</name>
  <description>${escapeXml(wp.description || "")}</description>
  <ExtendedData>
    <Data name="Image"><value>${escapeXml(wp.photoRef || "no photo taken")}</value></Data>
    ${extData}
  </ExtendedData>
  <Point><coordinates>${wp.lon},${wp.lat},0</coordinates></Point>
</Placemark>`;
      })
      .join("\n");
    const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
<name>${escapeXml(project.name)}</name>
${placemarks}
</Document>
</kml>`;
    const fname = `${project.name.replace(/\s+/g, "_")}.kml`;
    download(fname, kml, "application/vnd.google-earth.kml+xml");
    await deliverToDropbox(fname, kml, "application/vnd.google-earth.kml+xml");
    setBusy(null);
  }

  async function exportKMZ() {
    setBusy("kmz");
    try {
      await ensureJSZip();
      const sorted = [...project.waypoints].sort((a, b) => a.locationNum - b.locationNum);
      const placemarks = sorted
        .map((wp) => {
          const extData = project.customFields
            .map((f) => {
              const val = (wp.customValues && wp.customValues[f.id]) || "";
              return `<Data name="${escapeXml(f.label)}"><value>${escapeXml(val)}</value></Data>`;
            })
            .join("");
          return `<Placemark>
  <name>Location ${pad3(wp.locationNum)}</name>
  <description>${escapeXml(wp.description || "")}</description>
  <ExtendedData>
    <Data name="Image"><value>${escapeXml(wp.photoRef || "no photo taken")}</value></Data>
    ${extData}
  </ExtendedData>
  <Point><coordinates>${wp.lon},${wp.lat},0</coordinates></Point>
</Placemark>`;
        })
        .join("\n");
      const kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
<name>${escapeXml(project.name)}</name>
${placemarks}
</Document>
</kml>`;
      const zip = new window.JSZip();
      zip.file("doc.kml", kml);
      const blob = await zip.generateAsync({ type: "blob" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${project.name.replace(/\s+/g, "_")}.kmz`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch (e) {
      alert("KMZ export failed: " + e.message);
    }
    setBusy(null);
  }

  async function exportPDF() {
    setBusy("pdf");
    try {
      await ensureJsPDF();
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ unit: "pt", format: "letter" });
      const pageW = 612, pageH = 792;
      const margin = 36;
      const sorted = [...project.waypoints].sort((a, b) => a.locationNum - b.locationNum);
      const slotH = (pageH - margin * 2) / 2;

      sorted.forEach((wp, idx) => {
        const slot = idx % 2;
        if (slot === 0 && idx !== 0) doc.addPage();
        const top = margin + slot * slotH;
        const photoW = 200, photoH = slotH - 20;
        const photoX = margin, photoY = top + 10;

        doc.setDrawColor(180);
        doc.setFillColor(245, 242, 235);
        doc.rect(photoX, photoY, photoW, photoH, "FD");
        doc.setFontSize(11);
        doc.setTextColor(120);
        if (wp.photoRef) {
          doc.text("Photo Ref:", photoX + photoW / 2, photoY + photoH / 2 - 10, { align: "center" });
          doc.setFontSize(9);
          const fnLines = doc.splitTextToSize(wp.photoRef, photoW - 10);
          doc.text(fnLines, photoX + photoW / 2, photoY + photoH / 2 + 4, { align: "center" });
        } else {
          doc.text("No photo taken", photoX + photoW / 2, photoY + photoH / 2, { align: "center" });
        }

        const textX = photoX + photoW + 20;
        let textY = top + 24;
        doc.setFontSize(16);
        doc.setTextColor(168, 67, 30);
        doc.setFont(undefined, "bold");
        doc.text(`Location ${pad3(wp.locationNum)}`, textX, textY);
        textY += 18;

        doc.setFontSize(10);
        doc.setTextColor(40);
        doc.setFont(undefined, "normal");
        doc.text(`Lat: ${wp.lat.toFixed(6)}   Lon: ${wp.lon.toFixed(6)}`, textX, textY);
        textY += 16;

        doc.setFont(undefined, "bold");
        doc.text("Notes:", textX, textY);
        textY += 13;
        doc.setFont(undefined, "normal");
        const descLines = doc.splitTextToSize(wp.description || "(none)", pageW - textX - margin);
        doc.text(descLines, textX, textY);
        textY += descLines.length * 13 + 6;

        project.customFields.forEach((f) => {
          const val = (wp.customValues && wp.customValues[f.id]) || "(none)";
          doc.setFont(undefined, "bold");
          doc.text(`${f.label}:`, textX, textY);
          textY += 13;
          doc.setFont(undefined, "normal");
          const lines = doc.splitTextToSize(String(val), pageW - textX - margin);
          doc.text(lines, textX, textY);
          textY += lines.length * 13 + 6;
        });

        if (slot === 0) {
          doc.setDrawColor(200);
          doc.line(margin, top + slotH, pageW - margin, top + slotH);
        }
      });

      doc.save(`${project.name.replace(/\s+/g, "_")}_waypoints.pdf`);
    } catch (e) {
      alert("PDF export failed: " + e.message);
    }
    setBusy(null);
  }

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
      <TopBar title="Export" onBack={onBack} />
      <div style={{ padding: 16, flex: 1, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{
          background: dbxConnected ? "#DCE8D5" : "#FBE3D6",
          border: `1.5px solid ${dbxConnected ? "#6B8F5C" : COLORS.line}`,
          borderRadius: 10,
          padding: "10px 14px",
          fontSize: 13,
          color: COLORS.ink,
        }}>
          {dbxConnected
            ? `Dropbox connected — exports upload to ${project.dropboxParentFolder ? "/" + project.dropboxParentFolder + "/DATA" : "your project DATA folder"} and also download locally.`
            : "Dropbox not connected — exports download locally only. Connect in Project Setup to also upload."}
        </div>
        {dbxMsg && (
          <div style={{ fontSize: 12, color: COLORS.ink, background: COLORS.bg, padding: "8px 10px", borderRadius: 8 }}>
            {dbxMsg}
          </div>
        )}
        <div style={{ fontSize: 13, color: COLORS.inkSoft, fontWeight: 700 }}>DATA</div>
        <ExportRow
          icon={<FileText size={20} />}
          title="CSV"
          subtitle="Spreadsheet-friendly, all attributes"
          onClick={exportCSV}
          busy={busy === "csv"}
        />
        <ExportRow
          icon={<MapIcon size={20} />}
          title="GeoJSON"
          subtitle="For QGIS, ArcGIS, web maps"
          onClick={exportGeoJSON}
          busy={busy === "geojson"}
        />
        <ExportRow
          icon={<MapIcon size={20} />}
          title="KML"
          subtitle="Opens directly in Google Earth"
          onClick={exportKML}
          busy={busy === "kml"}
        />
        <ExportRow
          icon={<MapIcon size={20} />}
          title="KMZ"
          subtitle="Compressed KML, shareable single file"
          onClick={exportKMZ}
          busy={busy === "kmz"}
        />
        <div style={{ fontSize: 13, color: COLORS.inkSoft, fontWeight: 700, marginTop: 12 }}>
          DOCUMENTS &amp; PHOTOS
        </div>
        <ExportRow
          icon={<FileText size={20} />}
          title="PDF Report"
          subtitle="Waypoint attributes, 2 per page, with photo filename reference"
          onClick={exportPDF}
          busy={busy === "pdf"}
        />
        <div style={{
          background: COLORS.card,
          border: `1px solid ${COLORS.line}`,
          borderRadius: 12,
          padding: 16,
          marginTop: 4,
        }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: COLORS.ink, marginBottom: 4 }}>Photos</div>
          <div style={{ fontSize: 13, color: COLORS.inkSoft, lineHeight: 1.5 }}>
            Photos upload directly to your project's Dropbox PHOTOS folder when taken, named Pic001.jpg, Pic002.jpg, and so on. The matching filename is recorded in each waypoint's Image column. No separate photo export needed.
          </div>
        </div>
      </div>
    </div>
  );
}

function ExportRow({ icon, title, subtitle, onClick, busy }) {
  return (
    <button
      onClick={onClick}
      disabled={busy}
      style={{
        background: COLORS.card,
        border: `1px solid ${COLORS.line}`,
        borderRadius: 12,
        padding: 16,
        display: "flex",
        alignItems: "center",
        gap: 14,
        textAlign: "left",
        opacity: busy ? 0.6 : 1,
      }}
    >
      <div style={{ color: COLORS.rust }}>{icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontWeight: 700, fontSize: 15 }}>{busy ? "Working…" : title}</div>
        <div style={{ fontSize: 12, color: COLORS.inkSoft }}>{subtitle}</div>
      </div>
    </button>
  );
}

// ---------- External libs are preloaded via <script> tags in index.html ----------
function ensureJsPDF() {
  return new Promise((resolve, reject) => {
    if (window.jspdf) return resolve();
    reject(new Error("jsPDF failed to load. Check your internet connection."));
  });
}

function ensureJSZip() {
  return new Promise((resolve, reject) => {
    if (window.JSZip) return resolve();
    reject(new Error("JSZip failed to load. Check your internet connection."));
  });
}

// ---------- Mount ----------
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<FieldSurveyApp />);

</script>
</body>
</html>
